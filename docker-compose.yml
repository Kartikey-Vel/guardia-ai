# Guardia AI Enhanced System - Docker Compose
version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: guardia-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: guardia
      MONGO_INITDB_ROOT_PASSWORD: guardia123
      MONGO_INITDB_DATABASE: guardia_ai
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    ports:
      - "27017:27017"
    networks:
      - guardia_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache (for session management and caching)
  redis:
    image: redis:7.2-alpine
    container_name: guardia-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - guardia_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Guardia AI Application
  guardia-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guardia-ai-app
    restart: unless-stopped
    environment:
      # Database - MongoDB Atlas (Cloud)
      MONGODB_URL: mongodb+srv://aryanbajpai2411:ESOS5bbK4XLq2mZV@gaurdia-ai-vi-main.drm97zq.mongodb.net/?retryWrites=true&w=majority&appName=gaurdia-ai-vi-main
      MONGODB_DATABASE: guardia_ai_db
      
      # Google Cloud Configuration (environment-based)
      GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY}
      GCS_BUCKET_NAME: guardia_ai_vi
      GOOGLE_CLOUD_PROJECT_ID: gaurdia-ai
      ENABLE_VIDEO_INTELLIGENCE: true
      
      # Redis
      REDIS_URL: redis://redis:6379/0
      
      # Application
      ENVIRONMENT: production
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: false
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-jwt-key-change-this-in-production}
      JWT_EXPIRATION_MINUTES: 60
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      
      # Storage
      MEDIA_STORAGE_PATH: /app/storage/media
      IMAGES_PATH: /app/storage/images
      VIDEOS_PATH: /app/storage/videos
      FACES_PATH: /app/storage/faces
      LOGS_PATH: /app/storage/logs
      
      # Detection
      FACE_DETECTION_CONFIDENCE: 0.5
      OBJECT_DETECTION_CONFIDENCE: 0.5
      ALERT_COOLDOWN_SECONDS: 60
      
      # Notifications
      ENABLE_EMAIL_NOTIFICATIONS: ${ENABLE_EMAIL_NOTIFICATIONS:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      
      ENABLE_SMS_NOTIFICATIONS: ${ENABLE_SMS_NOTIFICATIONS:-false}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      
      # Logging
      LOG_LEVEL: INFO
      
    volumes:
      - guardia_storage:/app/storage
      - ./config:/app/config:ro
      - /dev/video0:/dev/video0  # USB camera access
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - guardia_network
    devices:
      - /dev/video0:/dev/video0  # USB camera access
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: guardia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - guardia-ai
    networks:
      - guardia_network
    profiles:
      - with-nginx

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  guardia_storage:
    driver: local

networks:
  guardia_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
