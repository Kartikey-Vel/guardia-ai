services:
  guardia-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guardia-surveillance
    restart: unless-stopped
    init: true
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./images:/app/images
      - ./encodings:/app/encodings
      - ./faces:/app/faces
      - ./detected:/app/detected
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - DISPLAY=:0
      - PYTHONPATH=/app/src
      - DEBIAN_FRONTEND=noninteractive
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      - guardia-net

  # Minimal fallback version (motion detection only)
  guardia-ai-minimal:
    build:
      context: .
      dockerfile: Dockerfile.minimal
    container_name: guardia-surveillance-minimal
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./images:/app/images
      - ./encodings:/app/encodings
      - ./faces:/app/faces
      - ./detected:/app/detected
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - PYTHONPATH=/app/src
      - DEBIAN_FRONTEND=noninteractive
    stdin_open: true
    tty: true
    profiles:
      - minimal
    networks:
      - guardia-net

networks:
  guardia-net:
    driver: bridge
