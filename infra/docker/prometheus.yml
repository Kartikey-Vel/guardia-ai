global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Camera Ingest Service
  - job_name: 'camera-ingest'
    static_configs:
      - targets: ['camera-ingest:8001']

  # Preprocessing Service
  - job_name: 'preprocessing'
    static_configs:
      - targets: ['preprocessing:8002']

  # Model Services
  - job_name: 'skelegnn'
    static_configs:
      - targets: ['skelegnn:8003']

  - job_name: 'motionstream'
    static_configs:
      - targets: ['motionstream:8004']

  - job_name: 'moodtiny'
    static_configs:
      - targets: ['moodtiny:8005']

  # FusionController
  - job_name: 'fusion-controller'
    static_configs:
      - targets: ['fusion-controller:8006']

  # Alerting Service
  - job_name: 'alerts'
    static_configs:
      - targets: ['alerts:8007']

  # API Service
  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']
