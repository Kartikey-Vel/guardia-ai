name: guardia_ai_frontend
description: Guardia AI Surveillance System - Frontend

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.2
  material_design_icons_flutter: ^7.0.7296
  
  # State Management
  provider: ^6.1.1
  get: ^4.6.6
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.2
  web_socket_channel: ^2.4.0
  
  # Authentication
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Video & Camera
  camera: ^0.10.5+5
  video_player: ^2.7.2
  
  # Charts & Analytics
  fl_chart: ^0.64.0
  syncfusion_flutter_charts: ^23.1.36
  
  # Notifications
  flutter_local_notifications: ^16.1.0
  
  # Utilities
  intl: ^0.18.1
  path_provider: ^2.1.1
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
