# Guardia AI Enhanced System - Development Docker Compose
version: '3.8'

services:
  # MongoDB Database for Development
  mongodb-dev:
    image: mongo:7.0
    container_name: guardia-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: dev
      MONGO_INITDB_ROOT_PASSWORD: dev123
      MONGO_INITDB_DATABASE: guardia_ai_dev
    volumes:
      - mongodb_dev_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - guardia_dev_network

  # Redis Cache for Development
  redis-dev:
    image: redis:7.2-alpine
    container_name: guardia-redis-dev
    restart: unless-stopped
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    networks:
      - guardia_dev_network

  # Guardia AI Development Application
  guardia-ai-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: guardia-ai-dev
    restart: unless-stopped
    environment:
      # Database - MongoDB Atlas (Cloud)
      MONGODB_URL: mongodb+srv://aryanbajpai2411:ESOS5bbK4XLq2mZV@gaurdia-ai-vi-main.drm97zq.mongodb.net/?retryWrites=true&w=majority&appName=gaurdia-ai-vi-main
      MONGODB_DATABASE: guardia_ai_db
      
      # Google Cloud Configuration (environment-based)
      GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY}
      GCS_BUCKET_NAME: guardia_ai_vi
      GOOGLE_CLOUD_PROJECT_ID: gaurdia-ai
      ENABLE_VIDEO_INTELLIGENCE: true
      
      # Redis
      REDIS_URL: redis://redis-dev:6379/0
      
      # Application
      ENVIRONMENT: development
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: true
      
      # Security (dev keys)
      SECRET_KEY: development-secret-key-not-for-production
      JWT_EXPIRATION_MINUTES: 1440  # 24 hours for development
      
      # CORS (permissive for development)
      CORS_ORIGINS: "*"
      
      # Detection (lower thresholds for testing)
      FACE_DETECTION_CONFIDENCE: 0.3
      OBJECT_DETECTION_CONFIDENCE: 0.3
      ALERT_COOLDOWN_SECONDS: 10
      
      # Development features
      ENABLE_API_DOCS: true
      ENABLE_RELOAD: true
      ENABLE_PROFILING: true
      TEST_MODE: true
      MOCK_CAMERAS: true
      
      # Logging
      LOG_LEVEL: DEBUG
      
    volumes:
      - .:/app  # Mount source code for hot reload
      - guardia_dev_storage:/app/storage
      - /dev/video0:/dev/video0  # USB camera access
    ports:
      - "8000:8000"
      - "8001:8001"  # Debug port
    depends_on:
      - mongodb-dev
      - redis-dev
    networks:
      - guardia_dev_network
    devices:
      - /dev/video0:/dev/video0  # USB camera access
    command: >
      sh -c "pip install -e . && 
             python -m debugpy --listen 0.0.0.0:8001 --wait-for-client start_server.py"

  # MongoDB Express (Database Administration)
  mongo-express:
    image: mongo-express:latest
    container_name: guardia-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: dev
      ME_CONFIG_MONGODB_ADMINPASSWORD: dev123
      ME_CONFIG_MONGODB_URL: mongodb://dev:dev123@mongodb-dev:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      - mongodb-dev
    networks:
      - guardia_dev_network

  # Redis Commander (Redis Administration)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: guardia-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis-dev:6379
    ports:
      - "8082:8081"
    depends_on:
      - redis-dev
    networks:
      - guardia_dev_network

volumes:
  mongodb_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  guardia_dev_storage:
    driver: local

networks:
  guardia_dev_network:
    driver: bridge
