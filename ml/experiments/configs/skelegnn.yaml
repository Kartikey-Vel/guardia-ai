# SkeleGNN Training Configuration

model:
  name: skelegnn
  num_classes: 7
  num_joints: 17
  num_frames: 16
  in_channels: 3

dataset:
  name: ntu_rgbd
  root: ../datasets/ntu_rgbd
  train_split: train
  val_split: val
  num_workers: 4
  
  # Data augmentation
  augmentation:
    random_rotate: true
    rotation_range: [-15, 15]  # degrees
    random_scale: true
    scale_range: [0.9, 1.1]
    random_shift: true
    shift_range: [-0.1, 0.1]
    random_noise: true
    noise_std: 0.01

training:
  batch_size: 32
  num_epochs: 100
  
  optimizer:
    type: adam
    lr: 0.001
    weight_decay: 0.0001
  
  scheduler:
    type: cosine
    T_max: 100
    eta_min: 0.00001
  
  loss:
    type: cross_entropy
    label_smoothing: 0.1
    class_weights: null  # or list of 7 weights for imbalanced classes
  
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.001

validation:
  batch_size: 64
  metric: accuracy
  
checkpoints:
  save_dir: ./checkpoints/skelegnn
  save_best: true
  save_frequency: 10  # save every N epochs

wandb:
  enabled: true
  project: guardia-ai
  entity: null  # your wandb username/team
  name: skelegnn-v1
  tags: [skelegnn, action-recognition, ntu-rgbd]

# Action classes
classes:
  - normal
  - fight_detected
  - fall_detected
  - running
  - trespassing
  - threatening_pose
  - suspicious_movement
