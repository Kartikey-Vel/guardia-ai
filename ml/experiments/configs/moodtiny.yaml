# MoodTiny Training Configuration

model:
  name: moodtiny
  type: mobilenet  # 'mobilenet' or 'efficientnet'
  num_classes: 6
  pretrained: true  # Use ImageNet pretrained weights
  dropout: 0.3

dataset:
  name: affectnet
  root: ../datasets/affectnet
  train_split: train
  val_split: val
  num_workers: 4
  
  # Image processing
  image_size: 112
  blur_background: true  # Privacy-preserving
  
  # Data augmentation
  augmentation:
    random_flip: true
    random_rotation: true
    rotation_range: [-15, 15]
    random_brightness: true
    brightness_range: [0.8, 1.2]
    random_contrast: true
    contrast_range: [0.8, 1.2]
    random_crop: true
    crop_size: 112

training:
  batch_size: 64
  num_epochs: 60
  
  optimizer:
    type: adamw
    lr: 0.001
    weight_decay: 0.01
  
  scheduler:
    type: cosine
    T_max: 60
    eta_min: 0.00001
  
  loss:
    type: cross_entropy
    label_smoothing: 0.1
    class_weights: null  # Set if classes are imbalanced
  
  # Transfer learning
  freeze_backbone: false  # Set to true for faster training
  freeze_epochs: 0  # Number of epochs to freeze backbone
  
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.001

validation:
  batch_size: 128
  metric: accuracy

checkpoints:
  save_dir: ./checkpoints/moodtiny
  save_best: true
  save_frequency: 5

wandb:
  enabled: true
  project: guardia-ai
  entity: null
  name: moodtiny-mobilenet-v1
  tags: [moodtiny, emotion-recognition, affectnet, privacy]

# Emotion classes
classes:
  - neutral
  - stress
  - aggression
  - sadness
  - fear
  - anxiety

# Privacy settings
privacy:
  blur_background: true
  blur_radius: 51
  aggregate_crowd: true
  aggregation_method: attention  # 'mean', 'max', or 'attention'
